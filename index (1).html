<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Damas Realtime Arena Pro</title>
    
    </head>
<body>

    <div class="container">
        <div id="menuScreen" class="screen active">
            <h1>Damas Arena Pro</h1>
            <div class="form-group">
                <label for="roomId">Código da Sala</label>
                <input type="text" id="roomId" placeholder="Digite o ID da sala">
            </div>
            <button id="joinBtn">Entrar na Arena</button>
        </div>

        <div id="gameScreen" class="screen">
            <div id="roomDisplay">Sala: -</div>
            <div id="statusBar" class="status-bar">Conectando...</div>
            <div class="board-wrapper">
                <div id="board"></div>
            </div>
        </div>
    </div>

    </body>
</html>
    <style>
        :root {
            --bg-color: #070a13;
            --container-bg: #0f1524;
            --board-border: #1e293b;
            --board-dark: #b58863;
            --board-light: #f0d9b5;
            --red-piece: radial-gradient(circle at 30% 30%, #ff4d4d, #990000);
            --black-piece: radial-gradient(circle at 30% 30%, #64748b, #0f172a);
            --accent-color: #10b981;
            --selected-color: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #1e1b4b 0%, #070a13 100%);
            color: #f3f4f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 12px;
            overflow-x: hidden;
        }

        .container {
            background-color: var(--container-bg);
            padding: 16px;
            border-radius: 20px;
            box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.7);
            width: 100%;
            max-width: 400px;
            text-align: center;
            display: flex;
            flex-direction: column;
            border: 1px solid #1e293b;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 14px;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .screen { display: none; width: 100%; }
        .screen.active { display: flex; flex-direction: column; align-items: center; }

        .form-group {
            margin-bottom: 16px;
            text-align: left;
            width: 100%;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #334155;
            background-color: #1e293b;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        input:focus { border-color: var(--accent-color); }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
        }

        #roomDisplay {
            font-size: 0.9rem;
            margin-bottom: 10px;
            color: #94a3b8;
        }

        .status-bar {
            width: 100%;
            background-color: #192237;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 14px;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid #23314f;
        }

        .board-wrapper {
            width: 100%;
            background-color: var(--board-border);
            padding: 6px;
            border-radius: 14px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            width: 100%;
            user-select: none;
            border-radius: 8px;
            overflow: hidden;
        }

        .cell {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .cell.light { background-color: var(--board-light); }
        .cell.dark { background-color: var(--board-dark); }
        
        .cell.selected {
            box-shadow: inset 0 0 0 3px var(--selected-color);
            background-color: #d97706 !important;
            z-index: 5;
        }
        
        .cell.highlight-move::after {
            content: '';
            width: 18px;
            height: 18px;
            background-color: rgba(16, 185, 129, 0.85);
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 8px var(--accent-color);
            z-index: 4;
        }

        .piece {
            width: 80%;
            height: 80%;
            border-radius: 50%;
            position: relative;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.6), inset 0 -3px 4px rgba(0,0,0,0.5);
            z-index: 3;
        }

        .piece::after {
            content: '';
            position: absolute;
            top: 15%; left: 15%; right: 15%; bottom: 15%;
            border-radius: 50%;
            border: 1.5px dashed rgba(255, 255, 255, 0.15);
        }

        .piece.red { background: var(--red-piece); border: 1px solid #660000; }
        .piece.black { background: var(--black-piece); border: 1px solid #020617; }

        .piece.king::before {
            content: '👑';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
        }
      }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, set, onValue, update, runTransaction } from "firebase/database";

        const firebaseConfig = {
            apiKey: "AIzaSyC1VqevNvvPYLcLxKlG2hXuQxk5RmgXmfo",
            authDomain: "damas-b5904.firebaseapp.com",
            projectId: "damas-b5904",
            storageBucket: "damas-b5904.firebasestorage.app",
            messagingSenderId: "1021528509348",
            appId: "1:1021528509348:web:bed573382dc8121b748f31"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentRoom = "";
        let playerSide = null; 
        let currentTurn = 'red';
        let gameState = [];
        let selectedPiece = null;
        let validMoves = [];

        const menuScreen = document.getElementById('menuScreen');
        const gameScreen = document.getElementById('gameScreen');
        const roomIdInput = document.getElementById('roomId');
        const joinBtn = document.getElementById('joinBtn');
        const roomDisplay = document.getElementById('roomDisplay');
        const statusBar = document.getElementById('statusBar');
        const boardElement = document.getElementById('board');

        const initialBoard = [
            ["", "b", "", "b", "", "b", "", "b"],
            ["b", "", "b", "", "b", "", "b", ""],
            ["", "b", "", "b", "", "b", "", "b"],
            ["", "", "", "", "", "", "", ""],
            ["", "", "", "", "", "", "", ""],
            ["r", "", "r", "", "r", "", "r", ""],
            ["", "r", "", "r", "", "r", "", "r"],
            ["r", "", "r", "", "r", "", "r", ""]
        ];

        joinBtn.addEventListener('click', () => {
            const room = roomIdInput.value.trim().toLowerCase();
            if (!room) return alert("Por favor, insira o código da sala.");
            currentRoom = room;
            connectToRoom(room);
        });

        // CORREÇÃO CRÍTICA: Garante que o objeto do Firebase vire uma matriz 8x8 perfeita sem pular linhas vazias
        function normalizeBoard(firebaseBoard) {
            let normalized = [];
            for (let r = 0; r < 8; r++) {
                normalized[r] = [];
                for (let c = 0; c < 8; c++) {
                    normalized[r][c] = (firebaseBoard && firebaseBoard[r] && firebaseBoard[r][c]) ? firebaseBoard[r][c] : "";
                }
            }
            return normalized;
        }

        function connectToRoom(roomName) {
            const roomRef = ref(db, 'rooms/' + roomName);

            runTransaction(roomRef, (currentData) => {
                if (currentData === null) {
                    return {
                        board: initialBoard,
                        turn: 'red',
                        playerRed: true,
                        playerBlack: false
                    };
                } else if (currentData.playerBlack === false) {
                    currentData.playerBlack = true;
                    return currentData;
                }
                return; 
            }).then((result) => {
                const snapshot = result.snapshot.val();
                
                if (result.committed && snapshot.playerRed && !snapshot.playerBlack) {
                    playerSide = 'red';
                } else if (snapshot.playerBlack && playerSide !== 'red') {
                    playerSide = 'black';
                } else if (!playerSide) {
                    playerSide = 'spectator';
                }

                menuScreen.classList.remove('active');
                gameScreen.classList.add('active');

                onValue(roomRef, (snap) => {
                    const data = snap.val();
                    if (data) {
                        // Normaliza a matriz antes de renderizar para impedir o travamento e o congelamento visual
                        gameState = normalizeBoard(data.board);
                        currentTurn = data.turn;
                        
                        let sideText = "Espectador 👁️";
                        let sideColor = "#94a3b8";
                        if (playerSide === 'red') { sideText = "Vermelho 🔴"; sideColor = "#ff4d4d"; }
                        if (playerSide === 'black') { sideText = "Preto ⚫"; sideColor = "#64748b"; }

                        roomDisplay.innerHTML = `Sala: <b>${roomName.toUpperCase()}</b> | Você: <span style="color:${sideColor}">${sideText}</span>`;
                        renderBoard();
                        updateStatus();
                    }
                });
            }).catch(err => {
                console.error(err);
                statusBar.innerText = "Erro ao conectar com o servidor!";
                statusBar.style.color = "#ff4d4d";
            });
        }

        function updateStatus() {
            if (playerSide === 'spectator') {
                statusBar.innerText = `Modo Espectador • Turno: ${currentTurn === 'red' ? 'Vermelho 🔴' : 'Preto ⚫'}`;
                statusBar.style.color = "#94a3b8";
                return;
            }
            if (currentTurn === playerSide) {
                statusBar.innerText = "Sua vez! Faça sua jogada.";
                statusBar.style.color = "#10b981";
            } else {
                statusBar.innerText = `Aguardando oponente (${currentTurn === 'red' ? 'Vermelho 🔴' : 'Preto ⚫'})...`;
                statusBar.style.color = "#94a3b8";
            }
        }

        function renderBoard() {
            boardElement.innerHTML = "";
            
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell', (r + c) % 2 === 1 ? 'dark' : 'light');
                    cell.dataset.row = r;
                    cell.dataset.col = c;

                    const pieceData = gameState[r][c];
                    if (pieceData && pieceData !== "") {
                        const piece = document.createElement('div');
                        piece.classList.add('piece');
                        if (pieceData.startsWith('r')) piece.classList.add('red');
                        if (pieceData.startsWith('b')) piece.classList.add('black');
                        if (pieceData.endsWith('K')) piece.classList.add('king');
                        cell.appendChild(piece);
                    }

                    if (selectedPiece && selectedPiece.row === r && selectedPiece.col === c) {
                        cell.classList.add('selected');
                    }

                    const isMoveValid = validMoves.some(m => m.targetRow === r && m.targetCol === c);
                    if (isMoveValid) {
                        cell.classList.add('highlight-move');
                    }

                    cell.addEventListener('click', () => handleCellClick(r, c));
                    boardElement.appendChild(cell);
                }
            }
        }

        function handleCellClick(row, col) {
            if (playerSide === 'spectator' || currentTurn !== playerSide) return;
            const clickedPiece = gameState[row][col];

            if (clickedPiece && clickedPiece !== "" && ((playerSide === 'red' && clickedPiece.startsWith('r')) || (playerSide === 'black' && clickedPiece.startsWith('b')))) {
                selectedPiece = { row, col, type: clickedPiece };
                validMoves = calculateMoves(row, col, clickedPiece);
                renderBoard();
                return;
            }

            const move = validMoves.find(m => m.targetRow === row && m.targetCol === col);
            if (selectedPiece && move) {
                executeMove(move);
            } else {
                selectedPiece = null;
                validMoves = [];
                renderBoard();
            }
        }

        function calculateMoves(row, col, type) {
            const moves = [];
            const isKing = type.endsWith('K');
            const colDirs = [-1, 1];

            if (isKing) {
                const rowDirs = [-1, 1];
                rowDirs.forEach(rd => {
                    colDirs.forEach(cd => {
                        let nextR = row + rd;
                        let nextC = col + cd;
                        let pieceInWay = null;

                        while (nextR >= 0 && nextR < 8 && nextC >= 0 && nextC < 8) {
                            const target = gameState[nextR][nextC];
                            if (!pieceInWay) {
                                if (!target || target === "") {
                                    moves.push({ targetRow: nextR, targetCol: nextC, isJump: false });
                                } else {
                                    const isOpponent = type.startsWith('r') ? target.startsWith('b') : target.startsWith('r');
                                    if (isOpponent) pieceInWay = { r: nextR, c: nextC };
                                    else break;
                                }
                            } else {
                                if (!target || target === "") {
                                    moves.push({ targetRow: nextR, targetCol: nextC, isJump: true, capturedRow: pieceInWay.r, capturedCol: pieceInWay.c });
                                } else break;
                            }
                            nextR += rd; nextC += cd;
                        }
                    });
                });
            } else {
                const activeDir = type.startsWith('r') ? [-1] : [1];
                activeDir.forEach(rd => {
                    colDirs.forEach(cd => {
                        const nextR = row + rd;
                        const nextC = col + cd;

                        if (nextR >= 0 && nextR < 8 && nextC >= 0 && nextC < 8) {
                            const target = gameState[nextR][nextC];
                            if (!target || target === "") {
                                moves.push({ targetRow: nextR, targetCol: nextC, isJump: false });
                            } else {
                                const isOpponent = type.startsWith('r') ? target.startsWith('b') : target.startsWith('r');
                                if (isOpponent) {
                                    const jumpR = nextR + rd;
                                    const jumpC = nextC + cd;
                                    if (jumpR >= 0 && jumpR < 8 && jumpC >= 0 && jumpC < 8 && (!gameState[jumpR][jumpC] || gameState[jumpR][jumpC] === "")) {
                                        moves.push({ targetRow: jumpR, targetCol: jumpC, isJump: true, capturedRow: nextR, capturedCol: nextC });
                                    }
                                }
                            }
                        }
                    });
                });
            }
            const jumpMoves = moves.filter(m => m.isJump);
            return jumpMoves.length > 0 ? jumpMoves : moves;
        }

        function executeMove(move) {
            let piece = gameState[selectedPiece.row][selectedPiece.col];
            gameState[move.targetRow][move.targetCol] = piece;
            gameState[selectedPiece.row][selectedPiece.col] = "";

            if (move.isJump) gameState[move.capturedRow][move.capturedCol] = "";

            if (playerSide === 'red' && move.targetRow === 0) gameState[move.targetRow][move.targetCol] = 'rK';
            if (playerSide === 'black' && move.targetRow === 7) gameState[move.targetRow][move.targetCol] = 'bK';

            const nextTurn = playerSide === 'red' ? 'black' : 'red';
            const roomRef = ref(db, 'rooms/' + currentRoom);
            
            update(roomRef, {
                board: gameState,
                turn: nextTurn
            });

            selectedPiece = null;
            validMoves = [];
        }
    </script>
</body>
</html>
